<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLEV PRODUCTIONS™ - Official Website</title>
    <script>
      // Global shims for process and event listeners to prevent runtime errors in some environments
      (function() {
        var mockProcess = {
          env: { NODE_ENV: 'development' },
          on: function() { return this; },
          emit: function() { return this; },
          addListener: function() { return this; },
          removeListener: function() { return this; },
          once: function() { return this; },
          off: function() { return this; },
          cwd: function() { return '/'; },
          browser: true
        };

        try {
          if (typeof window !== 'undefined') {
            // If window.process already exists, copy its existing keys into mockProcess safely
            if (window.process && typeof window.process === 'object') {
              for (var key in window.process) {
                try {
                  if (window.process[key] !== undefined) {
                    mockProcess[key] = window.process[key];
                  }
                } catch (err) {}
              }
            }
            
            // Redefine window.process to always point to our robust mockProcess
            try {
              Object.defineProperty(window, 'process', {
                value: mockProcess,
                writable: true,
                configurable: true,
                enumerable: true
              });
            } catch (e) {
              // Fallback to direct assignment
              window.process = mockProcess;
            }
            
            window.global = window;
          }
        } catch (e) {
          console.warn("Process window shim warning:", e);
        }

        try {
          if (typeof globalThis !== 'undefined') {
            try {
              Object.defineProperty(globalThis, 'process', {
                value: window.process || mockProcess,
                writable: true,
                configurable: true,
                enumerable: true
              });
            } catch (e) {
              globalThis.process = window.process || mockProcess;
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
